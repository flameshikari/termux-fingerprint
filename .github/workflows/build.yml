name: Build
run-name: ${{ inputs.debug && 'Build (Debug)' || 'Build' }} @ ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false
        description: Debug
      changelog:
        description: Changelog [base64]
        required: false
      publish:
        type: boolean
        default: true
        description: Publish

env:
  token: ${{ github.token }}
  filename: termux-fingerprint
  owner: flameshikari

concurrency: ${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 20

    - name: Extract Values
      run: |
        cat << EOF >> $GITHUB_ENV
        version=$(grep versionName app/build.gradle | awk -F"'" '{print $2}')
        package_name=$(grep applicationId app/build.gradle | awk -F"'" '{print $2}')
        EOF

    - name: Create changelog
      if: inputs.debug == false
      run: |
        whatsnew="whatsnew"
        changelog="$whatsnew/whatsnew-en-US"
        mkdir -pv "$whatsnew"
        echo "${{ inputs.changelog }}" | base64 -d | tee "$changelog"
        cat << EOF >> $GITHUB_ENV
        whatsnew=$whatsnew
        changelog=$changelog
        EOF

    - name: Build debug APK
      if: inputs.debug == true
      run: |
        gradle assembleDebug
        mv -v app/build/outputs/apk/debug/*.apk ${{ env.filename }}-debug.apk

    - name: Build release AAB & APK
      if: inputs.debug == false
      run: |
        gradle assembleRelease
        gradle bundleRelease
        mv -v app/build/outputs/apk/release/*.apk .
        mv -v app/build/outputs/bundle/release/*.aab .

    - name: Sign AAB & APK
      if: inputs.debug == false
      uses: kevin-david/zipalign-sign-android-release@main
      id: sign
      with:
        alias: ${{ secrets.KEYSTORE_ALIAS }}
        keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        releaseDirectory: .

    - name: Rename AAB & APK
      if: inputs.debug == false
      env:
        f0: ${{ steps.sign.outputs.signedReleaseFile0 }}
        f1: ${{ steps.sign.outputs.signedReleaseFile1 }}
      run: |
        for signed in ${{ env.f0 }} ${{ env.f1 }}; do
          mv -v $signed ${{ env.filename }}.$(echo $signed | awk -F. '{if (NF>1) print $NF}')
        done

    - name: Upload signed AAB & APK in Artifacts
      if: inputs.debug == false
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.filename }}
        path: |
          ${{ env.filename }}.aab
          ${{ env.filename }}.apk
        retention-days: 7

    - name: Upload debug APK in Artifacts
      if: inputs.debug == true
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.filename }}-debug
        path: ${{ env.filename }}-debug.apk
        retention-days: 7

    - name: Create a GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.filename }}.apk
        name: ${{ env.version }}
        tag_name: ${{ env.version }}
        token: ${{ env.token }}
        body_path: ${{ env.changelog }}
      if: |
        github.repository_owner == ${{ env.owner }} &&
        inputs.debug == false &&
        inputs.publish == true

    - name: Upload AAB to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        releaseFiles: ${{ env.filename }}.aab
        packageName: ${{ env.package_name }}
        serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        mappingFile: app/build/outputs/mapping/release/mapping.txt
        whatsNewDirectory: ${{ env.whatsnew }}
        inAppUpdatePriority: 5
      if: |
        github.repository_owner == ${{ env.owner }} &&
        inputs.debug == false &&
        inputs.publish == true
